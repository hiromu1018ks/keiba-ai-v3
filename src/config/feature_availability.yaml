# Keiba AI v3 — feature_availability registry（§13.3 / §13.5・Phase 3 Plan 03-01）
#
# Phase 3 で枠（features: []）から §13.5 全 feature エントリに拡充。
# schema_version 0.1.0 → 0.2.0（Phase 3 で初めて features を埋めた印・§19.1 再現性）。
# 各 feature エントリは7項目スキーマ（feature_name / feature_group / available_from_timing /
# source_role / source_table / cutoff_rule / leakage_risk_level）を持つ。
#
# REVIEWS HIGH #2: cutoff_semantics ブロックで strict_less_than / JST midnight を仕様化。
# REVIEWS HIGH #4: source_role フィールドで target_obs_banned / history_allowed_post_race /
#                  both_allowed を区別。sibababacd/dirtbabacd は target_obs_banned で
#                  registry 未登録・babacd（過去走 source）は history_allowed_post_race。
# D-07: available_from_timing は {entry_confirmed, post_position_confirmed} のみ許可。

schema_version: "0.2.0"

# ---------------------------------------------------------------------------
# REVIEWS HIGH #2: cutoff semantics の仕様化（厳密 `<`・JST midnight 解釈）
# PIT filter の単一不変量: history.as_of_datetime < observation.feature_cutoff_datetime
# ---------------------------------------------------------------------------
cutoff_semantics:
  comparison_operator: "strict_less_than"
  timezone: "Asia/Tokyo"
  cutoff_definition: "feature_cutoff_datetime = pd.to_datetime(race_date) - pd.Timedelta(days=1) (JST midnight)"
  boundary_rule: "race row is included in history IFF race.as_of_datetime < feature_cutoff_datetime (strict <); a race on the same calendar date as feature_cutoff_datetime IS excluded"
  documented_in: "Parquet §12.4 metadata field feature_cutoff_rule"

# ---------------------------------------------------------------------------
# §13.3 項目スキーマ（7項目・Phase 3 で source_role を追加・HIGH #4）
# ---------------------------------------------------------------------------
feature_schema:
  feature_name:
    type: "string"
    description: "feature 識別子（例: rolling_kakuteijyuni_mean_5）"
  feature_group:
    type: "string"
    description: "feature 分類（horse_static / jockey / trainer / bloodline / race_context / post_position / rolling_* / running_style）"
  available_from_timing:
    type: "string"
    description: "Phase 1-A allowlist: {entry_confirmed, post_position_confirmed} のみ許可（D-07）"
  source_role:
    type: "string"
    description: "target_obs_banned / history_allowed_post_race / both_allowed（HIGH #4 taxonomy）"
  source_table:
    type: "string"
    description: "正規化済み source（例: normalized.n_uma_race）。raw は readonly SELECT のみ"
  cutoff_rule:
    type: "string"
    description: "race_date - 1 day (strict < cutoff, JST midnight)（§13.2/§13.4・HIGH #2）"
  leakage_risk_level:
    type: "string"
    description: "low / medium / high。allowlist test で高リスクは必ず検査"

