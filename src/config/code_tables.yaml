# Keiba AI v3 — 補助コード表（実データ SELECT DISTINCT で裏取り・Pitfall 3: CODE.md 不完全）
#
# 由来: PostgreSQL everydb2 に接続し SELECT DISTINCT で確認した値のみ記載。
# docs/everydb2/CODE.md はスクレイピング不完全（D-10）のため参照元にしない。

# ---------------------------------------------------------------------------
# jyocd（場コード）— JRA 東西10場のみ。地方競馬（jyocd>=30）は対象外（Pitfall 2）
# 実測: everydb2.public.n_race で jyocd IN ('01'..'10') が JRA。30以上は NAR/海外
# ---------------------------------------------------------------------------
jyocd:
  "01": "札幌"
  "02": "函館"
  "03": "福島"
  "04": "新潟"
  "05": "東京"
  "06": "中山"
  "07": "中京"
  "08": "阪神"
  "09": "京都"
  "10": "小倉"

# ---------------------------------------------------------------------------
# syubetucd（競走種別コード）— §7.3 で障害（18/19）はモデル対象外
# 実測（全期間・live-DB readonly・2026-06-28 全面再照合）:
#   syubetucd は **馬齢カテゴリ**（2歳/3歳/古馬）を表すコードであって、クラス
#   （新馬/未勝利/1勝...）とは **直交する軸**。同一 syubetucd に複数クラスが混在する。
#   平地と障害でコード分離。class_normalize 側で syubetucd IN ('18','19') を
#   交差確認に使用（gradecd='D' が障害G3かの判定・A1）。
#
#   【重要】v1.1.0 label_spec 改訂により・newcomer/maiden 判定は syubetucd でなく
#   ``class_name_normalized``（jyokencd5 由来・src/config/class_normalization.yaml）で
#   行う。syubetucd は障害識別（'18'/'19'）と馬齢カテゴリ参考値としてのみ使用。
#   class_name_normalized がクラス（新馬/未勝利/1勝...）の唯一の正しい指標。
#
# 実測分布（全期間 2015-2025・normalized.n_race）:
#   '11'（2歳カテゴリ）: 未勝利3623 / 新馬2710 / 1勝363 / OP328 races（混在・新馬は多数派ですらない）
#   '12'（3歳カテゴリ）: 未勝利9611 / 1勝1559 / OP629 / 新馬599 races（混在・新馬は最少）
#   '13'（2歳カテゴリ）: 1勝5657 / 2勝2819 / 3勝1198 / OP1069 races（未勝利0件・定義と全面矛盾）
#   '14'（3歳カテゴリ）: 1勝3630 / 2勝2372 / 3勝1076 / OP906 races（未勝利0件・定義と全面矛盾）
#   '18'（障害・飛越）  : 未勝利 + OP・重賞（障害）の混在（障害コードとしては正）
#   '19'（障害・OP）    : 未勝利 + OP・重賞（障害）の混在（障害コードとしては正）
# ---------------------------------------------------------------------------
syubetucd:
  "00": "平地（通常・馬齢カテゴリ混在）"
  "11": "2歳カテゴリ（平地・新馬/未勝利/1勝/OP 混在）"
  "12": "3歳カテゴリ（平地・未勝利/1勝/OP/新馬 混在）"
  "13": "2歳カテゴリ（平地・1勝/2勝/3勝/OP 混在・未勝利0件）"
  "14": "3歳カテゴリ（平地・1勝/2勝/3勝/OP 混在・未勝利0件）"
  "15": "条件戦（平地）"
  "16": "OP・重賞（平地）"
  "17": "特別指定競走"
  "18": "障害（飛越）— §7.3 モデル除外対象（障害専用コード・平地との混在なし）"
  "19": "障害（障害OP・J・G1/2/3）— §7.3 モデル除外対象（障害専用コード・平地との混在なし）"
  note: |
    実測分布は 2026-06-28 に live-DB readonly で全期間（2015以降）を SELECT DISTINCT
    syubetucd, class_name_normalized, count(*) で再照合した結果（label-newcomer-universe
    debug session・Evidence 参照）。

    【v1.1.0 改訂の背景】従来の code_tables.yaml は syubetucd を「2歳新馬/3歳新馬」等の
    クラス名で記載していたが・実測では syubetucd は馬齢カテゴリ（2歳/3歳/古馬）のみを表し・
    クラス（新馬/未勝利/1勝...）とは直交する。label_spec.yaml v1.1.0 で newcomer/maiden 判定を
    class_name_normalized 基準に変更した根拠がこの実測分布。class_name_normalized は
    src/config/class_normalization.yaml の jyokencd5_map（jyokencd5='701'→新馬/'703'→未勝利/
    '005'→1勝クラス...）由来で・クラスの唯一の正しい指標。

    grade_numeric='D' と syubetucd IN ('18','19') の交差確認を推奨（A1・障害識別）。
